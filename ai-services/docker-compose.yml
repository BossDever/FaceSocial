services:
  face-detection:
    build:
      context: ./face-detection
      dockerfile: Dockerfile
    volumes:
      - ./face-detection:/app
    ports:
      - "8000:8000"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  face-recognition:
    build:
      context: ./face-recognition
      dockerfile: Dockerfile
    volumes:
      - ./face-recognition:/app
    ports:
      - "8001:8001"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - FACENET_MODEL_PATH=/app/app/models/facenet/20180402-114759.pb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      - milvus

  # Milvus standalone service
  milvus:
    image: milvusdb/milvus:v2.3.4
    volumes:
      - ./milvus/data:/var/lib/milvus/data
    ports:
      - "19530:19530"
      - "19121:19121"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    restart: always # เพิ่มการ restart เพื่อให้ retry การเชื่อมต่อ

  # etcd for Milvus metadata
  etcd:
    image: bitnami/etcd:latest
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    volumes:
      - ./milvus/etcd:/bitnami/etcd
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO for Milvus storage
  minio:
    image: minio/minio:latest
    container_name: milvus-minio
    volumes:
      - ./milvus/minio:/data
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: ["minio", "server", "/data"]

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
