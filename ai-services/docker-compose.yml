services:
  face-detection:
    build:
      context: ./face-detection
      dockerfile: Dockerfile
    volumes:
      - ./face-detection:/app
    ports:
      - "8000:8000"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    
  face-recognition:
    build:
      context: ./face-recognition
      dockerfile: Dockerfile
    volumes:
      - ./face-recognition:/app
    ports:
      - "8001:8001"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - FACENET_MODEL_PATH=/app/app/models/facenet/20180402-114759.pb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      - milvus
      - etcd

  # etcd service - สำหรับให้ Milvus ใช้ในการเก็บ metadata
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_NAME=etcd0
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd:2380
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - ./etcd/data:/etcd-data
    ports:
      - "2379:2379"
      - "2380:2380"

  # Milvus service with etcd configuration
  milvus:
    image: milvusdb/milvus:v2.3.4
    volumes:
      - ./milvus/data:/var/lib/milvus/data
      - ./milvus/conf:/var/lib/milvus/conf
      - ./milvus/logs:/var/lib/milvus/logs
    ports:
      - "19530:19530"
      - "19121:19121"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    depends_on:
      - etcd
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/api/v1/health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Alternative: Milvus Lite (ถ้าต้องการใช้แทนแบบด้านบน)
  # milvus-lite:
  #   image: milvusdb/milvus:v2.3.4-lite
  #   volumes:
  #     - ./milvus/data:/var/lib/milvus/data
  #     - ./milvus/conf:/var/lib/milvus/conf
  #     - ./milvus/logs:/var/lib/milvus/logs
  #   ports:
  #     - "19530:19530"
  #     - "19121:19121"
  #   environment:
  #     - MILVUS_HOST=milvus
  #     - MILVUS_PORT=19530
  #     - MILVUS_STANDALONE_LITE=true
  #   command: ["milvus", "run", "standalone"]

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3