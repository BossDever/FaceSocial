services:
  face-detection:
    build:
      context: ./face-detection
      dockerfile: Dockerfile
    volumes:
      - ./face-detection:/app
    ports:
      - "8000:8000"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    
  face-recognition:
    build:
      context: ./face-recognition
      dockerfile: Dockerfile
    volumes:
      - ./face-recognition:/app
    ports:
      - "8001:8001"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - MILVUS_HOST=milvus-lite
      - MILVUS_PORT=19530
      - FACENET_MODEL_PATH=/app/app/models/facenet/20180402-114759.pb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      - milvus-lite

  # Milvus Lite service - เวอร์ชันที่ง่ายกว่าและไม่ต้องการ etcd
  milvus-lite:
    image: milvusdb/milvus:v2.3.4-lite
    container_name: milvus-lite
    volumes:
      - ./milvus/data:/var/lib/milvus/data
    ports:
      - "19530:19530"
      - "19121:19121"
    environment:
      - MILVUS_STANDALONE_LITE=true
    command: ["milvus", "run", "standalone"]

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data