version: '3.8'

services:
  face-detection:
    build:
      context: ./face-detection
      dockerfile: Dockerfile
    volumes:
      - ./face-detection:/app
    ports:
      - "8000:8000"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    
  face-recognition:
    build:
      context: ./face-recognition
      dockerfile: Dockerfile
    volumes:
      - ./face-recognition:/app
    ports:
      - "8001:8001"
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command: bash -c "cd /app && python -m uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      - milvus

  milvus:
    image: milvusdb/milvus:v2.3.4
    volumes:
      - ./milvus/data:/var/lib/milvus/data
      - ./milvus/conf:/var/lib/milvus/conf
      - ./milvus/logs:/var/lib/milvus/logs
    ports:
      - "19530:19530"
      - "19121:19121"
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    command: ["milvus", "run", "standalone"]

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data